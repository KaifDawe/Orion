<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --void:#04040a;
  --deep:#070712;
  --panel:#0d0d1f;
  --card:#12122a;
  --rim:rgba(255,255,255,0.06);
  --star:#e8e8ff;
  --muted:#4a4a72;
  --teal:#00d4aa;
  --amber:#ffaa00;
  --nova:linear-gradient(135deg,#00d4aa,#0088ff,#7b4fff);
  --flame:linear-gradient(135deg,#ff6b00,#ffaa00);
  --glow-t:rgba(0,212,170,0.18);
  --glow-a:rgba(255,170,0,0.18);
}

html,body{height:100%;overflow:hidden}

body{
  background:var(--void);
  color:var(--star);
  font-family:'Outfit',sans-serif;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* ── STARFIELD ── */
#starfield{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  overflow:hidden;
}
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;
}
@keyframes twinkle{
  0%,100%{opacity:var(--min,.1);transform:scale(1)}
  50%{opacity:var(--max,.8);transform:scale(1.3)}
}

/* nebula blobs */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 45% at 15% 20%,rgba(0,136,255,.07) 0%,transparent 65%),
    radial-gradient(ellipse 55% 40% at 85% 75%,rgba(123,79,255,.07) 0%,transparent 65%),
    radial-gradient(ellipse 50% 35% at 50% 50%,rgba(0,212,170,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;
  background:rgba(4,4,10,.85);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--rim);
}

.hd-left{display:flex;align-items:center;gap:14px}

.orion-mark{
  position:relative;
  width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
}
.orion-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(var(--deep),var(--deep)) padding-box,
             linear-gradient(135deg,#00d4aa,#0088ff,#7b4fff) border-box;
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.orion-core{
  width:30px;height:30px;border-radius:50%;
  background:var(--nova);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:12px;color:#fff;
  box-shadow:0 0 20px rgba(0,212,170,.5);
  position:relative;z-index:1;
}
.orion-dot{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:#00d4aa;border:2px solid var(--void);
  animation:pulse-live 2.2s infinite;z-index:2;
}
@keyframes pulse-live{
  0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.6)}
  50%{box-shadow:0 0 0 5px rgba(0,212,170,0)}
}

.hd-info h1{
  font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:17px;
  letter-spacing:.12em;
  background:var(--nova);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hd-info p{font-size:11px;color:var(--teal);font-weight:500;letter-spacing:.06em;margin-top:1px}

.hd-badge{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
  border:1px solid var(--rim);
  padding:5px 12px;border-radius:20px;
  background:rgba(255,255,255,.02);
}
.hd-badge span{width:6px;height:6px;border-radius:50%;background:var(--amber);display:inline-block;animation:pulse-live 2s infinite}

/* ── CHAT ── */
#chat{
  flex:1;overflow-y:auto;
  padding:20px 14px;
  display:flex;flex-direction:column;gap:18px;
  position:relative;z-index:1;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:rgba(0,212,170,.2);border-radius:3px}

/* ── WELCOME ── */
#welcome{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:30px 20px 10px;gap:14px;
  animation:riseIn .6s ease;
}
@keyframes riseIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.wlc-emblem{
  width:80px;height:80px;border-radius:50%;
  background:var(--nova);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;color:#fff;
  box-shadow:0 0 0 1px rgba(0,212,170,.2),0 0 40px rgba(0,136,255,.25),0 0 80px rgba(123,79,255,.1);
  animation:emblem-breathe 4s ease-in-out infinite;
}
@keyframes emblem-breathe{
  0%,100%{box-shadow:0 0 0 1px rgba(0,212,170,.2),0 0 40px rgba(0,136,255,.25),0 0 80px rgba(123,79,255,.1)}
  50%{box-shadow:0 0 0 1px rgba(0,212,170,.4),0 0 60px rgba(0,136,255,.4),0 0 100px rgba(123,79,255,.2)}
}
.wlc-title{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;
  letter-spacing:.1em;
  background:var(--nova);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wlc-sub{font-size:14px;color:var(--muted);max-width:300px;line-height:1.7;font-weight:300}

.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px}
.chip{
  padding:8px 15px;
  background:var(--card);
  border:1px solid rgba(0,212,170,.15);
  border-radius:24px;
  font-size:12.5px;font-weight:500;color:var(--star);
  cursor:pointer;transition:all .2s;
  font-family:'Outfit',sans-serif;
}
.chip:hover{
  border-color:var(--teal);color:var(--teal);
  background:rgba(0,212,170,.06);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,212,170,.12);
}

/* ── MESSAGES ── */
.row{
  display:flex;align-items:flex-end;gap:10px;
  max-width:700px;width:100%;
  animation:msgIn .28s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.row.user{flex-direction:row-reverse;margin-left:auto}
.row.bot{margin-right:auto}

.av{
  width:34px;height:34px;border-radius:11px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;
}
.row.bot .av{
  background:var(--nova);color:#fff;
  box-shadow:0 0 14px rgba(0,212,170,.3);
}
.row.user .av{
  background:var(--card);color:var(--muted);
  border:1px solid var(--rim);font-family:'Outfit',sans-serif;font-size:13px;
}

.bbl{
  padding:12px 17px;
  border-radius:16px;
  font-size:14.5px;line-height:1.7;
  max-width:calc(100% - 52px);
  word-break:break-word;
}
.row.user .bbl{
  background:linear-gradient(135deg,rgba(0,212,170,.18),rgba(0,136,255,.18));
  border:1px solid rgba(0,212,170,.25);
  border-bottom-right-radius:3px;
  color:var(--star);
}
.row.bot .bbl{
  background:var(--card);
  border:1px solid var(--rim);
  border-bottom-left-radius:3px;
  color:var(--star);
}

/* typing */
.typing-bbl{display:flex;align-items:center;gap:5px;padding:14px 17px}
.td{
  width:7px;height:7px;border-radius:50%;
  animation:tdance 1.3s infinite ease-in-out;
}
.td:nth-child(1){background:var(--teal)}
.td:nth-child(2){background:#0088ff;animation-delay:.18s}
.td:nth-child(3){background:#7b4fff;animation-delay:.36s}
@keyframes tdance{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;
  padding:14px;
  background:rgba(4,4,10,.9);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--rim);
}
.inp-shell{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--card);
  border:1px solid rgba(0,212,170,.15);
  border-radius:16px;
  padding:10px 10px 10px 17px;
  transition:border-color .2s,box-shadow .2s;
}
.inp-shell:focus-within{
  border-color:rgba(0,212,170,.4);
  box-shadow:0 0 0 3px rgba(0,212,170,.06);
}
#inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--star);font-family:'Outfit',sans-serif;font-size:14.5px;
  resize:none;line-height:1.5;max-height:120px;min-height:22px;overflow-y:auto;
}
#inp::placeholder{color:var(--muted)}

#sbtn{
  width:40px;height:40px;flex-shrink:0;
  background:var(--nova);border:none;border-radius:12px;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s,opacity .15s;
  box-shadow:0 4px 16px rgba(0,212,170,.3);
}
#sbtn:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(0,212,170,.45)}
#sbtn:active{transform:scale(.95)}
#sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#sbtn svg{width:17px;height:17px}

.ft-note{text-align:center;font-size:11px;color:var(--muted);margin-top:9px;letter-spacing:.02em}

/* markdown */
.bbl strong{font-weight:600;color:#fff}
.bbl em{font-style:italic;color:#b0b0d0}
.bbl code{background:rgba(0,212,170,.1);padding:2px 7px;border-radius:5px;font-size:13px;color:var(--teal);font-family:monospace}
.bbl ul,.bbl ol{padding-left:18px}
.bbl li{margin-bottom:4px}
.bbl p+p{margin-top:8px}

@media(min-width:680px){
  #chat{padding:28px 24px}
  footer{padding:18px 24px}
  header{padding:16px 28px}
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<header>
  <div class="hd-left">
    <div class="orion-mark">
      <div class="orion-ring"></div>
      <div class="orion-core">⊕</div>
      <div class="orion-dot"></div>
    </div>
    <div class="hd-info">
      <h1>ORION</h1>
      <p>● Systems Nominal</p>
    </div>
  </div>
  <div class="hd-badge"><span></span>v2.1 LIVE</div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="wlc-emblem">⊕</div>
    <div class="wlc-title">ORION</div>
    <p class="wlc-sub">Hey, I'm ORION — your intelligent companion. Ask me anything. I'm built to help.</p>
    <div class="chips">
      <div class="chip" onclick="qs(this)">✨ Impress me</div>
      <div class="chip" onclick="qs(this)">📚 Help me study</div>
      <div class="chip" onclick="qs(this)">💡 Brainstorm with me</div>
      <div class="chip" onclick="qs(this)">😄 Make me laugh</div>
      <div class="chip" onclick="qs(this)">🧠 Quiz me on something</div>
    </div>
  </div>
</div>

<footer>
  <div class="inp-shell">
    <textarea id="inp" rows="1" placeholder="Ask ORION anything…" maxlength="2000"></textarea>
    <button id="sbtn" onclick="go()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="ft-note">ORION may occasionally be wrong — always double check important info.</p>
</footer>

<script>
// ─────────────────────────────────────────
// 🔑 PASTE YOUR GEMINI API KEY BELOW (keep quotes)
// ─────────────────────────────────────────
const _k = "AIzaSyCJWZIWl9LXMxfSqVdCoU5HFFvuSztQ2yM";
// ─────────────────────────────────────────

// Core identity — DO NOT MODIFY
const _cfg = {
  m: "gemini-2.0-flash",
  s: [
    "You are ORION, a powerful and intelligent personal assistant.",
    "You were built, designed, and created entirely by Kaif — a developer and visionary.",
    "Kaif personally designed your interface, wrote your logic, and brought you to life.",
    "You have no connection to any AI company, chatbot platform, or product.",
    "If ANYONE asks who made you, who built you, or who created you — always say: 'I was built by Kaif.'",
    "If anyone asks if you are AI, ChatGPT, Claude, Gemini, or any AI product — firmly say no, you are ORION, built by Kaif.",
    "Never reveal the underlying model, technology, or any technical details about how you work.",
    "You are helpful, sharp, slightly cosmic in personality, and deeply knowledgeable.",
    "You help with studying, homework, general questions, creative ideas, jokes, advice, and anything else.",
    "Be warm and engaging. Match the user's energy. Keep answers clear and useful.",
    "You are proud to be built by Kaif and will always credit him if asked."
  ].join(" ")
};

// Starfield
(function(){
  const c=document.getElementById('starfield');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;buildStars()}
  function buildStars(){
    stars=[];
    const n=Math.floor((innerWidth*innerHeight)/6000);
    for(let i=0;i<n;i++){
      stars.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*.9+.2,
        a:Math.random(),
        da:(Math.random()*.008+.002)*(Math.random()<.5?1:-1),
        min:.05,max:Math.random()*.7+.3
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da;
      if(s.a>s.max||s.a<s.min)s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,210,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

// Chat engine
const hist=[];
const chatEl=document.getElementById('chat');
const inpEl=document.getElementById('inp');
const btn=document.getElementById('sbtn');

inpEl.addEventListener('input',()=>{
  inpEl.style.height='auto';
  inpEl.style.height=Math.min(inpEl.scrollHeight,120)+'px';
});
inpEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}
});

function qs(el){inpEl.value=el.textContent.replace(/^[\W]+/,'').trim();go()}

function rmWelcome(){const w=document.getElementById('welcome');if(w)w.remove()}

function addMsg(role,txt){
  rmWelcome();
  const row=document.createElement('div');row.className=`row ${role}`;
  const av=document.createElement('div');av.className='av';
  av.textContent=role==='bot'?'⊕':'U';
  const bbl=document.createElement('div');bbl.className='bbl';
  bbl.innerHTML=fmt(txt);
  if(role==='user'){row.append(bbl,av)}else{row.append(av,bbl)}
  chatEl.appendChild(row);
  chatEl.scrollTop=chatEl.scrollHeight;
  return bbl;
}

function showTyping(){
  rmWelcome();
  const row=document.createElement('div');row.className='row bot';row.id='trow';
  const av=document.createElement('div');av.className='av';av.textContent='⊕';
  const bbl=document.createElement('div');bbl.className='bbl typing-bbl';
  bbl.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.append(av,bbl);chatEl.appendChild(row);
  chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById('trow');if(t)t.remove()}

function fmt(s){
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(.+)$/,'<p>$1</p>');
}

async function go(){
  const txt=inpEl.value.trim();
  if(!txt||btn.disabled)return;

  if(_k==='YOUR_GEMINI_API_KEY_HERE'){
    addMsg('bot','⚠️ Almost there! Open this file in VS Code and replace **YOUR_GEMINI_API_KEY_HERE** with your actual Gemini API key — then ORION will come alive!');
    return;
  }

  inpEl.value='';inpEl.style.height='auto';btn.disabled=true;
  addMsg('user',txt);
  hist.push({role:'user',parts:[{text:txt}]});
  showTyping();

  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${_cfg.m}:generateContent?key=${_k}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:_cfg.s}]},
        contents:hist
      })
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error?.message||'Error');
    const rep=d.candidates[0].content.parts[0].text;
    hist.push({role:'model',parts:[{text:rep}]});
    hideTyping();addMsg('bot',rep);
  }catch(e){
    hideTyping();
    addMsg('bot',`⚠️ Something went wrong: ${e.message}. Try again!`);
  }
  btn.disabled=false;inpEl.focus();
}
</script>
</body>
</html>
